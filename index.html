<style>
  /* --- 基本設定 --- */
  body { font-family: sans-serif; margin: 0; padding: 0 0 80px 0; background-color: #f4f7f6; -webkit-tap-highlight-color: transparent; }
  
  .page { 
    display: none; 
    padding: 0; 
    width: 100%;
    box-sizing: border-box;
  }
  .active { display: block; }

/* --- 1段目: メインヘッダー (45px) --- */
.header { 
  background: #3498db; color: white; height: 45px; line-height: 45px;
  padding: 0; font-weight: bold; font-size: 1.2em; text-align: center;
  position: sticky; top: 0; z-index: 200; margin: 0;
}

/* --- 2段目: 店コードエリア (55px) --- */
.shop-area { 
  background: #fff; height: 55px; padding: 0 10px; border-bottom: 2px solid #ddd;
  display: flex; align-items: center; 
  position: sticky; 
  top: 45px; /* 1段目の真下に固定 */
  z-index: 195; margin: 0; box-sizing: border-box;
}

/* --- 3段目: モード選択エリア --- */
/* ↓ ここから #unifiedPage > div:first-child, を削除しました */
#pageList > div:first-child,
#pageSummary > div:first-child,
#pageAll > div:first-child {
  position: sticky; 
  top: 100px; 
  z-index: 190;
  background: white; 
  margin: 0 !important;
  padding: 10px !important; 
  border-bottom: 1px solid #ddd;
  box-sizing: border-box;
}

/* スキャンページのモード選択だけを別途固定する設定を追加 */
#unifiedModeArea {
  position: sticky;
  top: 100px;
  z-index: 190;
  background: white;
  padding: 10px;
  border-bottom: 1px solid #ddd;
}  

/* --- 4段目: リストのヘッダー --- */
/* ここは3段目の高さ（約70pxと仮定）を足した位置に固定します */
.list-table thead th {
  position: sticky; 
  top: 100px; /* 100 + 3段目の要素の厚み(約70) */
  background-color: #eee; z-index: 185;
  border-bottom: 2px solid #ccc; padding: 8px 4px; margin: 0;
}

 
  #shopInput { width: 80px; height: 35px; font-size: 1.0em; text-align: center; border: 2px solid #3498db; background: #fff; border-radius: 4px; font-weight: bold; }

/* --- ビデオエリア：スクロールで逃げる設定 --- */
#interactive.viewport { 
  width: 100%; 
  height: 200px; 
  background: #000 !important; 
  position: relative; /* stickyではなく通常配置にする */
  overflow: hidden; 
  margin: 0; 
  display: block;
  z-index: 1; /* 重なり順を一番下にする */
  transform: translateZ(0);
}

  /* ビデオ要素：IDを1つに絞り、余計なものを一切排除 */
  #video { 
    width: 100%; 
    height: 100%; 
    object-fit: cover; 
    display: block; 
  }

  /* オーバーレイ：pointer-events: none で「壁」にならないようにする */
  .scan-overlay { 
    position: absolute; 
    top: 50%; left: 50%; 
    transform: translate(-50%, -50%); 
    width: 70%; height: 40%; 
    border: 2px solid rgba(52, 152, 219, 0.7); 
    border-radius: 8px; 
    box-shadow: 0 0 0 400px rgba(0, 0, 0, 0.3); 
    z-index: 2; 
    pointer-events: none !important; /* 絶対に触らせない */
  }
  
  .scan-line { 
    position: absolute; 
    top: 50%; left: 50%; 
    transform: translate(-50%, -50%); 
    width: 80%; height: 2px; 
    background-color: rgba(231, 76, 60, 0.8); 
    box-shadow: 0 0 8px rgba(231, 76, 60, 0.5); 
    z-index: 3; 
    pointer-events: none !important;
  }

  /* スキャン窓の上にある装飾要素が、クリックやカメラ起動を邪魔しないようにする */
/* ガイド線（映像の上に乗せたいもの） */
.scan-overlay, .scan-line {
  z-index: 5; /* 映像(1)より大きい数字にして、上に重ねる */
  pointer-events: none; /* 重ねても操作は邪魔しない */
}
  
/* 映像そのもの */
#video {
  position: absolute;
  top: 0; left: 0;
  z-index: 1; /* ベースと同じか、少し低め */
}
  /* フォーム・入力パーツ */

  .input-row { display: flex; align-items: center; margin-bottom: 12px; }

<script>
/**
 * 📡 通信設定 (GitHub用)
 */
const GAS_URL = "https://script.google.com/macros/s/AKfycbx8gPAAtgcOql4IKNKpUp5VC8zzU2RLTYxZDIBCwP_L0QERG3tRaN7uccLYBVCH9tM/exec";

async function callGAS(action, params = {}) {
  try {
    const res = await fetch(GAS_URL, { method: "POST", body: JSON.stringify({ action, ...params }) });
    return await res.json();
  } catch(e) { console.error(e); return null; }
}

let isScanning = false;
let currentCode = "";
let currentShopName = "";
let isFetching = false;
const codeReader = new ZXing.BrowserBarcodeReader();

/**
 * 📷 カメラ開始・停止の切り替え
 */
async function toggleScanner() {
  const btn = document.getElementById('btnToggleScan');
  if (isScanning) {
    stopAllCameras();
  } else {
    await startCamera();
  }
}

/**
 * 📷 カメラ起動
 */
async function startCamera() {
  const videoEl = document.getElementById('video');
  const btn = document.getElementById('btnToggleScan');
  
  try {
    codeReader.reset();
    const stream = await navigator.mediaDevices.getUserMedia({ 
      video: { facingMode: "environment", width: { ideal: 1280 }, height: { ideal: 720 } } 
    });
    
    videoEl.srcObject = stream;
    await videoEl.play();
    
    isScanning = true;
    
    if (btn) {
      btn.innerText = "🛑 停止";
      btn.className = "btn-main btn-stop";
    }

    codeReader.decodeContinuously(videoEl, (result, err) => {
      if (result && isScanning) {
        isScanning = false;
        codeReader.reset(); 
        
        const btnInner = document.getElementById('btnToggleScan');
        if (btnInner) {
          btnInner.innerText = "📷 スキャンを開始";
          btnInner.className = "btn-main btn-start";
        }
        processUnifiedFlow(result.text, document.getElementById('mainModeSelect').value);
      }
    });
  } catch (err) {
    console.error(err);
    alert("カメラを起動できません");
  }
}

/**
 * カメラを物理的に停止・解放する
 */
function stopAllCameras() {
  isScanning = false;
  try {
    codeReader.reset();
  } catch (e) { console.error("ZXing reset error:", e); }

  const videoEl = document.getElementById('video');
  if (videoEl && videoEl.srcObject) {
    const stream = videoEl.srcObject;
    const tracks = stream.getTracks();
    tracks.forEach(track => {
      track.stop(); // 完全に止める
    });
    videoEl.srcObject = null;
    videoEl.pause(); // 映像を止める
    videoEl.removeAttribute('src'); // ソースを消す
    videoEl.load();
  }

  const btn = document.getElementById('btnToggleScan');
  if (btn) {
    btn.innerText = "📷 スキャンを開始";
    btn.className = "btn-main btn-start";
  }
}
  
async function processShopCode() {
  const input = document.getElementById('shopInput');
  const display = document.getElementById('shopDisplay');
  const lockMsg = document.getElementById('shopLockMessage');
  const code = input.value.trim();
  
  if (!code || input.readOnly) return;

  display.innerText = "⏳ 照会中...";
  display.style.color = "#f39c12";

  try {
    const name = await callGAS("getStoreName", { code });
    if (name) {
      currentShopName = name;
      display.innerText = name;
      display.style.color = "#2c3e50"; 
      if (lockMsg) lockMsg.style.display = "none"; 
      input.readOnly = true; 
      input.style.backgroundColor = "#e8f5e9";
      const scanArea = document.getElementById('scanActionArea');
      if (scanArea) scanArea.style.display = "block";
    } else {
      display.innerText = "未登録の店舗";
      display.style.color = "#e74c3c";
      if (lockMsg) lockMsg.style.display = "block"; 
      input.value = "";
    }
  } catch (e) {
    display.innerText = "通信エラー";
  }
}

}

async function processUnifiedFlow(code, mode) {
  if (!code || isFetching) return;
  
  stopAllCameras(); // カメラを止める
  currentCode = code;
  isFetching = true;

  // --- お掃除処理（全店在庫エリアも追加） ---
  ['editArea', 'searchDetailArea', 'stockAllDetailArea', 'scanActionArea'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.style.display = 'none';
  });

  // 1. 表示ターゲットの決定
  let targetId = 'editArea';
  if (mode === 'search') targetId = 'searchDetailArea';
  if (mode === 'stockAll') targetId = 'stockAllDetailArea';

  const targetEl = document.getElementById(targetId);
  targetEl.style.display = 'block';

  // 2. 「シュッ」と移動
  setTimeout(() => {
    const scrollOffset = targetEl.offsetTop - 160; 
    window.scrollTo({ top: scrollOffset, behavior: 'smooth' });
  }, 100);

  // --- GASへの問い合わせ前の一時表示 ---
  if (mode === 'scan') {
    document.getElementById('expiry').value = new Date().toISOString().split('T')[0];
    document.getElementById('itemNameDisplay').innerText = "照会中...";
    document.getElementById('janDisplay').innerText = "JAN: " + code;
  } else if (mode === 'search') {
    document.getElementById('sDetailName').innerText = "照会中...";
    document.getElementById('sDetailJan').innerText = code;
    // Yahoo情報を一旦クリア（古い画像が残らないように）
    document.getElementById('sDetailImage').src = "";
    document.getElementById('sDetailPrice').innerText = "---";
  } else if (mode === 'stockAll') {
    document.getElementById('sStockName').innerText = "在庫照会中...";
    document.getElementById('stockAllTableBody').innerHTML = '<tr><td colspan="3" style="text-align:center; padding:20px;">読み込み中...</td></tr>';
  }

  // GASアクションの振り分け
  const action = (mode === 'stockAll') ? "getAllStoreStock" : "getProductMasterInfo";
  const params = (mode === 'stockAll') ? { barcode: code } : { code: code };

  const res = await callGAS(action, params);
  
  if (!isFetching) return;
  isFetching = false;
  
  if (!res) { alert("データが見つかりませんでした"); resetUI(false); return; }

  // --- 取得後の表示処理 ---

  if (mode === 'scan') {
    // 【期限登録モード】
    document.getElementById('itemNameDisplay').innerText = res.name;
    document.getElementById('mainRegBtn').disabled = false;

  } else if (mode === 'search') {
    // 【商品検索モード】 Yahoo詳細をしっかり表示
    document.getElementById('sDetailName').innerText = res.name;
    const dCode = res.janCode || code;
    document.getElementById('sDetailJan').innerText = dCode;
    document.getElementById('sDetailJanTop').innerText = dCode;
    
    if (res.yahoo) {
      document.getElementById('sDetailPrice').innerText = Number(res.yahoo.price).toLocaleString();
      document.getElementById('sDetailImage').src = res.yahoo.imageUrl;
      document.getElementById('sDetailBrand').innerText = res.yahoo.brand;
      document.getElementById('sDetailDesc').innerText = res.yahoo.description;
      document.getElementById('sDetailStock').innerText = res.yahoo.inStock;
    }
    document.getElementById('mainSaveBtn').disabled = false;

  } else if (mode === 'stockAll') {
    // 【全店在庫照会モード】
    showAllStoreStock(res);
  }
}

async function sendData() {
  const qtyInput = document.getElementById('qty');
  const qtyValue = qtyInput.value;

  }

  const btn = document.getElementById('mainRegBtn');

  btn.disabled = true;
  btn.innerText = "⏳ 登録中...";

  try {
    const res = await callGAS("registerItem", { 
      shopCode: document.getElementById('shopInput').value, 
      shopName: currentShopName, 
      barcode: currentCode, 
      qty: qtyValue, 
      expiryDate: document.getElementById('expiry').value 
    });

    if (res === "完了") {

/**
 * 📋 リスト・在庫関連（共通の器）
 */
function renderList(pageId, list) {
  const view = document.getElementById('view_' + pageId);
  const bulkBtn = document.getElementById('btnComplete_' + pageId);
  const stockBtn = document.getElementById('btnStockAll');
  const mode = document.getElementById('mainModeSelect').value;

  if (!list || list.length === 0) {
    view.innerHTML = '<div style="padding:20px;text-align:center;color:#999;">該当データはありません</div>';
    if(bulkBtn) bulkBtn.style.display = 'none';
    if(stockBtn) stockBtn.style.display = 'none';
    return;
  }

  // 並べ替え
  sortListByMode(pageId, list, mode);

  // ボタンの表示連動
  if(bulkBtn) bulkBtn.style.display = 'block';
  // 在庫確認ボタンは「全店ページ」かつ「期限登録モード」の時だけ
  if(stockBtn) {
    stockBtn.style.display = (pageId === 'pageAll' && mode === 'scan') ? 'block' : 'none';
  }
　let html = `<table class="list-table">${getTableHeaderByMode(mode, pageId)}`;
  
  list.forEach(item => {
    html += getRowHtmlByMode(mode, item, pageId);
  });
  view.innerHTML = html + '</table>';
}

/**
 * モード別の並べ替えロジック
 */
function sortListByMode(pageId, list, mode) {
  if (mode === 'scan') {
    // 期限登録モード：期限が近い順
    if (pageId === 'pageAll') {
      list.sort((a, b) => {
        if (a.shopCode !== b.shopCode) return a.shopCode.localeCompare(b.shopCode, undefined, {numeric: true});
        return new Date(a.expiry) - new Date(b.expiry);
      });
    } else {
      list.sort((a, b) => new Date(a.expiry) - new Date(b.expiry));
    }
  } else {
    // 商品検索モード：店コード順 > JANコード順
    list.sort((a, b) => {
      const shopComp = String(a.shopCode || "").localeCompare(String(b.shopCode || ""), undefined, { numeric: true });
      if (shopComp !== 0) return shopComp;
      return String(a.barcode || "").localeCompare(String(b.barcode || ""), undefined, { numeric: true });
    });
  }
}
  

/**
 * モード別のテーブルヘッダー（一括チェックボックス付き）
 */
function getTableHeaderByMode(mode, pageId) {
  // 「選択」の文字の下に、全選択用のチェックボックスを配置
  const selectHeader = `
    <th style="text-align:center; width:50px;">
      一括選択<br>
      <input type="checkbox" id="selectAll_${pageId}" 
             onclick="toggleAllChecks(this, '${pageId}')" 
             style="width:20px; height:20px; margin-top:4px; cursor:pointer;">
    </th>`;

  // scanモード（期限登録）と searchモード（商品検索）でヘッダーを出し分け
  return (mode === 'scan') 
    ? `<thead><tr>${selectHeader}<th>期限/店舗</th><th>商品情報</th><th>数</th></tr></thead>`
    : `<thead><tr>${selectHeader}<th>店/在庫</th><th>商品情報</th><th>EC価格</th></tr></thead>`;
}

/**
 * モード別の行（TR）生成（色付け・データ参照を修正）
 */

function getRowHtmlByMode(mode, item, pageId) {
  // 店コード・店名
  const shopHeader = `<div class="shop-info jan-text" style="color:#666; margin-bottom:2px;">${item.shopCode || ''}　 ${item.shopName || ''}</div>`;
  // チェックボックス
  const checkbox = `<td style="text-align:center;"><input type="checkbox" class="bulk-check" data-id="${item.recordId}" data-jan="${item.barcode}" data-shop="${item.shopCode}"></td>`;

  if (mode === 'scan') {
    const today = new Date();
    today.setHours(0, 0, 0, 0);
    const dateStr = item.expiry || "";
    const expiryDate = new Date(dateStr.replace(/\//g, '-'));
    let rowClass = (dateStr && !isNaN(expiryDate) && expiryDate <= today) ? 'danger' : '';
    
    const stockDisplay = (pageId === 'pageAll') 
      ? `<div class="stock-badge stock-val" data-id="${item.recordId}" data-jan="${item.barcode}" data-shop="${item.shopCode}" style="display:none;"></div>`
      : `<div class="stock-badge">理論在庫: ${item.dataStock || '0'}</div>`;

    // ★リターン文の中身を整理しました
    return `
      <tr class="${rowClass}">
        ${checkbox}
        <td>
          ${shopHeader}
          <div style="font-size:0.9em;">${dateStr}</div>
        </td>
        <td>
          <div class="jan-text">${item.barcode}</div>
          <b>${item.itemName || item.name || "名称不明"}</b>
          ${stockDisplay}
        </td>
        <td class="qty-cell" style="text-align:center; vertical-align:middle;">
          <div onclick="editQty('${item.recordId}', ${item.qty})" 
               style="display:inline-block; width:55px; height:35px; line-height:35px; 
                      border: 1px solid #3498db; border-radius: 4px; background: #fff; 
                      color: #333; font-weight: bold; cursor: pointer; overflow: hidden; transition: 0.3s;">
            <span id="qty-val-${item.recordId}" style="font-size: 1.1em;">${item.qty}</span>
          </div>
        </td>
      </tr>`;

  } else if (mode === 'search') {
    const priceDisp = item.price ? `¥${Number(item.price).toLocaleString()}` : "---";
    const makerName = item.brand || item.maker || "";

    return `
      <tr>
        ${checkbox}
        <td style="text-align:center; font-size:0.85em;">
          ${shopHeader}
          <div style="font-weight:bold; color:#2c3e50;">${item.inStock || '不明'}</div>
        </td>
        <td>
          <div class="jan-text">${item.barcode}</div>
          <div style="font-size:0.85em; color:#7f8c8d; margin-bottom:2px;">${makerName}</div>
          <b style="font-size:0.95em;">${item.itemName || item.name || "名称不明"}</b>
        </td>
        <td style="text-align:center; color:#e67e22; font-weight:bold;">${priceDisp}</td>
      </tr>`;
  }
  return ""; 
}

async function bulkDelete(pageId) {
  const btn = document.getElementById(`btnComplete_${pageId}`);
  const mode = document.getElementById('mainModeSelect').value;
  const checks = document.querySelectorAll(`#view_${pageId} .bulk-check:checked`);
  
  if(checks.length === 0) return alert("商品を選択してください");
  if(!confirm(checks.length + "件の処理を完了しますか？")) return;

  // 1. ボタンを無効化 & テキスト保存
  const originalText = btn.innerText;
  btn.disabled = true;
  btn.innerText = "削除中...";

  try {
    // モードによってGASの関数を切り替え
    const action = (mode === 'scan') ? "deleteRowsBulk" : "deletePriceRowsBulk";
    const ids = Array.from(checks).map(c => c.getAttribute('data-id'));
    
    const res = await callGAS(action, { ids: ids });

    if (res) {
      alert("完了しました");
      refreshPage(pageId);
    }
  } catch (e) {
    alert("エラーが発生しました: " + e);
  } finally {
    // 2. 【重要】成功・失敗に関わらずボタンを復活させる
    btn.disabled = false;
    btn.innerText = originalText;
  }
}

function resetUI(shouldStopCamera = false) {
  isFetching = false;
  if (shouldStopCamera) {
    stopAllCameras(); 
  } else {
    startCamera(); 
  }
  
  // 各種表示エリアを隠す
  document.getElementById('editArea').style.display = 'none';
  document.getElementById('searchDetailArea').style.display = 'none';
  document.getElementById('manualJan').value = ""; 
  document.getElementById('stockAllDetailArea').style.display = 'none'; // これを追加

  // ★ 数量入力欄をブランクにする
  const qtyInput = document.getElementById('qty');
  if (qtyInput) {
    qtyInput.value = ""; 
  }

  if (currentShopName) {
    document.getElementById('scanActionArea').style.display = 'block';
  }

  // ボタンの状態を元に戻す
  const regBtn = document.getElementById('mainRegBtn');
  const saveBtn = document.getElementById('mainSaveBtn');

    regBtn.disabled = true; // 登録後は一旦無効化（次のスキャンを待つ）
    regBtn.innerText = "登録";

    saveBtn.innerText = "保存"; 
  }
}
  
function showPage(pageId) {
  try { stopAllCameras(); } catch(e) {}
  
  // ページ切り替え
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  const targetId = (pageId === 'pageScan') ? 'unifiedPage' : pageId;

  const pages = ['pageScan','pageList','pageSummary','pageAll'];
  navs.forEach((n, i) => n.classList.toggle('active', pages[i] === pageId));

  if (pageId === 'pageScan') {
    resetUI(false);
  } else {
    // ★ここがポイント：自動で refreshPage を呼ばないようにします。
    // もしページが真っ白で気になるなら、初期メッセージだけ出す。
    const view = document.getElementById('view_' + pageId);
    if (view && view.innerHTML === "") {
       view.innerHTML = '<div style="padding:20px;text-align:center;color:#999;">「リスト表示」ボタンを押してください</div>';
    }
  }
  scrollToTop();
}

function handleManualUnified() { const code = document.getElementById('manualJan').value.trim(); if (code) processUnifiedFlow(code, document.getElementById('mainModeSelect').value); }
function handleScroll() { const btn = document.getElementById('backToTop'); if (btn) btn.style.display = (window.pageYOffset > 300) ? 'flex' : 'none'; }
function scrollToTop() { window.scrollTo({ top: 0, behavior: 'smooth' }); }


/**
 * 🔄 ページとデータの再読み込み（ボタンの更新中表示を含む）
 */

function refreshPage(pageId) {
  const mode = document.getElementById('mainModeSelect').value;
  const shopCode = document.getElementById('shopInput').value;
  // ページを切り替えたり更新したりするときに、全選択チェックを外しておく
  
  const masterCheck = document.getElementById('selectAll_' + pageId);
  if (masterCheck) masterCheck.checked = false;
  
  // 1. ページ要素とボタンの特定
  if (pageId === 'pageScan' || pageId === 'unifiedPage') return;
  const container = document.getElementById(pageId);
  const targetBtn = container ? container.querySelector('.btn-list-init') : null;
  const targetView = document.getElementById('view_' + pageId);

  // ボタンの元のテキストを保持（全店舗リストならその名前で戻すため）
  const originalText = (pageId === 'pageAll') ? "全店舗リスト表示" : 
                       (pageId === 'pageList') ? "期限チェック表示" : "リスト表示";

  // --- 【重要】在庫チェックページのガード ---
  if (pageId === 'pageList' && mode !== 'scan') {
    if (targetView) {
      targetView.innerHTML = '<div style="padding:20px;text-align:center;color:#e74c3c;font-weight:bold;">⚠️ 期限登録モードに切り替えてから実行してください</div>';
    }
    return; // ここで終了。ボタンも更新中にはならない
  }

  // 2. ボタンを「更新中」状態にロック
  if (targetBtn) {
    targetBtn.disabled = true;
    targetBtn.innerText = "更新中...";
    targetBtn.style.opacity = "0.5";
  }

  // ボタンを元に戻すための共通処理
  const resetBtn = () => {
    if (targetBtn) {
      targetBtn.disabled = false;
      targetBtn.innerText = originalText;
      targetBtn.style.opacity = "1.0";
    }
  };

  // 店コードチェック
  if (!shopCode && pageId !== 'pageAll') {
    alert("店コードを入力してください");
    resetBtn();
    return;
  }

  if (targetView) targetView.innerHTML = '<div style="padding:20px;text-align:center;">読み込み中...</div>';

  // 3. 各モード・ページに応じて実行（すべて return して Promise を繋ぐ）
  if (pageId === 'pageList') {
    // 期限チェック：showAlertList が return callGAS(...) している必要があります
    return showAlertList().finally(resetBtn);
  } 
  else if (pageId === 'pageSummary') {
    // 登録リスト（自店）：モードによって呼び出す関数を変える
    if (mode === 'scan') {
      return loadShopDetail().finally(resetBtn);
    } else {
      return loadPriceCheckDetail().finally(resetBtn);
    }
  } 
  else if (pageId === 'pageAll') {
    // 全店舗リスト：この関数内で内部的に mode 判定して取得する
    return loadAllProducts().finally(resetBtn);
  }
}
  
function showAlertList() {
  const shopCode = document.getElementById('shopInput').value;
  const days = document.getElementById('periodSelect').value;
  // ★ return を追加
  return callGAS("getAlertList", { shopCode: shopCode, days: days })
    .then(list => renderList('pageList', list));
}
  

/**
 * 商品検索：自店舗リストの取得
 */
function loadPriceCheckDetail() {
  const shopCode = document.getElementById('shopInput').value;
  // return を追加し、重複していた関数を1つに統合
  return callGAS("getPriceCheckList", { shopCode: shopCode })
    .then(list => {
      list.sort((a, b) => String(a.barcode).localeCompare(String(b.barcode), undefined, {numeric: true}));
      renderList('pageSummary', list);
    })
    .catch(err => {
      document.getElementById('view_pageSummary').innerHTML = "データ取得エラー";
    });
}
  
/**
 * 期限管理：自店舗リストの取得
 */
function loadShopDetail() {
  const shopCode = document.getElementById('shopInput').value;
  // ★ return を追加
  return callGAS("getShopDetailList", { shopCode: shopCode })
    .then(list => {
      list.sort((a, b) => a.serial - b.serial);
      renderList('pageSummary', list);
    });
}
  
/**
 * 全店舗リスト用：モード別のデータ取得と多段階ソート
 */
function loadAllProducts() {
  const mode = document.getElementById('mainModeSelect').value;
  const pageId = 'pageAll';
  
  if (mode === 'scan') {
    return callGAS("getAllProductList").then(list => renderList(pageId, list));
  } else {
    return callGAS("getPriceCheckList", { shopCode: "" })
      .then(list => {
        list.sort((a, b) => {
          const shopComp = String(a.shopCode || "").localeCompare(String(b.shopCode || ""), undefined, { numeric: true });
          if (shopComp !== 0) return shopComp;
          return String(a.barcode || "").localeCompare(String(b.barcode || ""), undefined, { numeric: true });
        });
        renderList(pageId, list);
      })
      .catch(err => {
        document.getElementById('view_pageAll').innerHTML = "データ取得エラー";
      });
  }
}
  
 /**
 * 🌍 全店舗リスト用：チェックした商品の理論在庫を一括取得して表示
 * 取得開始時にチェックを自動で外すように改良
 */
async function fetchSelectedStocks() {
  const checks = document.querySelectorAll('#view_pageAll .bulk-check:checked');
  if (checks.length === 0) return alert("在庫を確認する商品を選択してください");

  // ボタンを「確認中」にする
  const btn = document.getElementById('btnStockAll');
  const originalText = "チェック商品在庫確認";
  if (btn) {
    btn.disabled = true;
    btn.innerText = "在庫照会中...";
    btn.style.opacity = "0.5";
  }

  // 1. チェックされた行から情報を抽出
  const targets = Array.from(checks).map(c => ({
    barcode: c.getAttribute('data-jan'),
    shopCode: c.getAttribute('data-shop'),
    recordId: c.getAttribute('data-id')
  }));

  // ★ 2. 処理が走り出したらチェックを外す
  checks.forEach(c => { c.checked = false; });

  try {
    // GASに一括問い合わせ
    const results = await callGAS("getBulkStocks", { targets });
    
    if (results && typeof results === 'object') {
      // 取得した在庫数を各行のバッジに反映
      targets.forEach(t => {
        const badge = document.querySelector(`.stock-val[data-id="${t.recordId}"]`);
        if (badge) {
          const stock = results[t.recordId] !== undefined ? results[t.recordId] : "不明";
          badge.innerText = "理論在庫: " + stock;
          badge.style.display = "inline-block"; 
        }
      });
    } else {
      alert("在庫データの取得に失敗しました");
    }
  } catch (e) {
    console.error(e);
    alert("通信エラーが発生しました");
  } finally {
    if (btn) {
      btn.disabled = false;
      btn.innerText = originalText;
      btn.style.opacity = "1.0";
    }
  }
}

// 現在の editQty をこれに丸ごと差し替え
async function editQty(recordId, oldQty) {
  const parentRow = document.getElementById(`qty-val-${recordId}`).closest('tr');
  const jan = parentRow.querySelector('.jan-text').innerText;
  const itemName = parentRow.querySelector('b').innerText;

  // 要素に流し込む
  document.getElementById('modalProductInfo').innerText = itemName;
  document.getElementById('modalJanInfo').innerText = jan;
  
  const input = document.getElementById('modalQtyInput');
  input.value = oldQty;
  
  document.getElementById('qtyModal').style.display = 'flex';
  
  // 入力窓を自動フォーカス & 全選択（すぐに打ち替えられるように）
  setTimeout(() => {
    input.focus();
    input.setSelectionRange(0, 9999); // 全選択
  }, 200);

  document.getElementById('modalConfirmBtn').onclick = async () => {
    const newQty = input.value;
    if (!newQty || newQty == oldQty) { closeQtyModal(); return; }
    const num = parseInt(newQty);
    if (isNaN(num) || num <= 0) { alert("1以上の数字を入力してください"); return; }

    closeQtyModal();

    // --- ここから下の「更新演出」は元のコードと同じ ---
    const displayElem = document.getElementById(`qty-val-${recordId}`);
    const parentBox = displayElem.parentElement;
    displayElem.style.fontSize = "10px";
    displayElem.innerText = "更新中...";
    displayElem.style.color = "#aaa";
    parentBox.style.pointerEvents = "none";

    try {
      const res = await callGAS("updateStockQty", { recordId: recordId, newQty: num });
      if (res === "完了") {
        displayElem.style.fontSize = "1.1em";
        displayElem.innerText = num;
        displayElem.style.color = "#333";
        parentBox.style.backgroundColor = "#e8f5e9";
        parentBox.setAttribute("onclick", `editQty('${recordId}', ${num})`);
      } else {
        alert("エラー: " + res);
        displayElem.innerText = oldQty;
        displayElem.style.color = "#333";
      }
    } catch (e) {
      alert("通信エラーが発生しました");
      displayElem.innerText = oldQty;
      displayElem.style.color = "#333";
    } finally {
      parentBox.style.pointerEvents = "auto";
      setTimeout(() => { parentBox.style.backgroundColor = "#fff"; }, 800);
    }
  };

  // キーボードを確実に呼び出し、数字を選択状態にする
  setTimeout(() => {
    input.focus();
    input.select();
  }, 100);
}

// モーダルを閉じるだけの関数
function closeQtyModal() {
  document.getElementById('qtyModal').style.display = 'none';
}
  
/**
 * 全選択・全解除の制御
 * @param {HTMLElement} source - クリックされた親チェックボックス
 * @param {string} pageId - 対象のページID（'pageList', 'pageSummary' など）
 */
function toggleAllChecks(source, pageId) {
  // そのページ（view_pageListなど）の中にあるチェックボックスだけを対象にする
  const container = document.getElementById('view_' + pageId);
  if (!container) return;
  
  // 各行に付与されている 'bulk-check' クラスのチェックボックスをすべて取得
  const checkboxes = container.querySelectorAll('.bulk-check');
  
  checkboxes.forEach(cb => {
    // 一番上のチェック（source）と同じ状態（チェックあり/なし）にする
    cb.checked = source.checked;
  });
}

/**
 * 全店在庫の結果を画面に表示 (JS)
 */
function showAllStoreStock(response) {
  const tbody = document.getElementById('stockAllTableBody');
  const nameDisplay = document.getElementById('sStockName');
  
  nameDisplay.innerText = response.itemName;
  tbody.innerHTML = ""; // 前の結果をクリア

  if (response.stocks.length === 0) {
    tbody.innerHTML = '<tr><td colspan="3" style="padding:20px; text-align:center;">該当商品の在庫データが見つかりません</td></tr>';
    return;
  }

  response.stocks.forEach(row => {
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td style="padding:10px; border-bottom:1px solid #eee;">${row.shopInfo}</td>
      <td style="padding:10px; border-bottom:1px solid #eee; font-size:0.8em; color:#666;">${row.itemInfo}</td>
      <td style="padding:10px; border-bottom:1px solid #eee; text-align:right; font-weight:bold; color:#2980b9;">${row.stock}</td>
    `;
    tbody.innerHTML += tr.innerHTML;
  });
  
  // スキャン後の「シュッ」とした移動
  const targetEl = document.getElementById('stockAllDetailArea');
  window.scrollTo({
    top: targetEl.offsetTop - 160,
    behavior: 'smooth'
  });
}
